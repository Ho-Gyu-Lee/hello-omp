# omp portable settings — applied via `omp config set <key> <value>`
# Format: <key><space><value>   (one per line)
#   - value is compact JSON (no spaces) for record/array keys, or a scalar
#   - lines starting with # and blank lines are ignored
# Add more `omp config set` keys below as needed (the "등" in the deploy order).

# --- model roles (GPT primary on high-volume lanes; Claude primary on specialist review/plan/advisor/vision lanes) ---
modelRoles {"default":"openai-codex/gpt-5.6-sol:xhigh","smol":"openai-codex/gpt-5.6-terra:medium","task":"openai-codex/gpt-5.6-sol:xhigh","commit":"openai-codex/gpt-5.6-terra:medium","slow":"anthropic/claude-opus-4-8:xhigh","plan":"anthropic/claude-fable-5:xhigh","designer":"openai-codex/gpt-5.6-sol:xhigh","vision":"anthropic/claude-fable-5:high","advisor":"anthropic/claude-fable-5:xhigh"}

# --- response display: keep model reasoning active but hide thinking blocks in the TUI ---
hideThinkingBlock true

# --- quota/429 fallback chains (cross-provider first; no primary model duplicated in its own fallback lane) ---
retry.fallbackChains {"default":["anthropic/claude-fable-5:xhigh","anthropic/claude-opus-4-8:xhigh","anthropic/claude-sonnet-5:xhigh","openai-codex/gpt-5.5:xhigh"],"smol":["anthropic/claude-sonnet-5:medium","openai-codex/gpt-5.6-luna:medium","openai-codex/gpt-5.5:medium","anthropic/claude-opus-4-8:medium"],"task":["anthropic/claude-fable-5:xhigh","anthropic/claude-opus-4-8:xhigh","anthropic/claude-sonnet-5:xhigh","openai-codex/gpt-5.5:xhigh"],"commit":["anthropic/claude-sonnet-5:medium","openai-codex/gpt-5.6-luna:medium","openai-codex/gpt-5.5:medium","anthropic/claude-opus-4-8:medium"],"slow":["openai-codex/gpt-5.6-sol:xhigh","anthropic/claude-fable-5:xhigh","anthropic/claude-sonnet-5:xhigh","openai-codex/gpt-5.5:xhigh"],"plan":["openai-codex/gpt-5.6-sol:xhigh","anthropic/claude-opus-4-8:xhigh","anthropic/claude-sonnet-5:xhigh","openai-codex/gpt-5.5:xhigh"],"designer":["anthropic/claude-fable-5:xhigh","anthropic/claude-opus-4-8:xhigh","anthropic/claude-sonnet-5:xhigh","openai-codex/gpt-5.5:xhigh"],"vision":["openai-codex/gpt-5.6-sol:high","anthropic/claude-opus-4-8:high","anthropic/claude-sonnet-5:high","openai-codex/gpt-5.5:high"],"advisor":["openai-codex/gpt-5.6-sol:xhigh","anthropic/claude-opus-4-8:xhigh","anthropic/claude-sonnet-5:xhigh","openai-codex/gpt-5.5:xhigh"]}

# --- Anthropic refusal fallback (server-side safety-classifier refusal -> Opus 4.8) ---
providers.anthropic.serverSideFallback true

# --- tool approvals: normal work is yolo; dangerous calls are gated by the extension hook ---
tools.approvalMode yolo
tools.approval {}

# --- subagent isolation: enable auto backend selection when isolated tasks are requested ---
task.isolation.mode auto

# --- advisor: stronger model passively reviews each turn, with bounded catch-up ---
advisor.enabled true
advisor.syncBacklog 1
