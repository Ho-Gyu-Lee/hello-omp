# omp portable settings — applied via `omp config set <key> <value>`
# Format: <key><space><value>   (one per line)
#   - value is compact JSON (no spaces) for record/array keys, or a scalar
#   - lines starting with # and blank lines are ignored
# Add more `omp config set` keys below as needed (the "등" in the deploy order).

# --- model roles (Fable 5; slow/plan use xhigh, per-turn Claude roles stay high) ---
modelRoles {"default":"openai-codex/gpt-5.5:xhigh","smol":"openai-codex/gpt-5.5:medium","task":"openai-codex/gpt-5.5:xhigh","commit":"openai-codex/gpt-5.5:medium","slow":"anthropic/claude-fable-5:xhigh","plan":"anthropic/claude-fable-5:xhigh","designer":"anthropic/claude-fable-5:high","vision":"anthropic/claude-fable-5:high","advisor":"anthropic/claude-fable-5:high"}

# --- symmetric fallback chains (codex<->anthropic on quota/429) ---
retry.fallbackChains {"default":["anthropic/claude-fable-5:high"],"smol":["anthropic/claude-fable-5:medium"],"task":["anthropic/claude-fable-5:high"],"commit":["anthropic/claude-fable-5:medium"],"slow":["openai-codex/gpt-5.5:xhigh"],"plan":["openai-codex/gpt-5.5:xhigh"],"designer":["openai-codex/gpt-5.5:xhigh"],"vision":["openai-codex/gpt-5.5:high"],"advisor":["openai-codex/gpt-5.5:xhigh"]}

# --- Fable 5 refusal fallback (safety-classifier refusal -> Opus 4.8) ---
providers.anthropic.serverSideFallback true

# --- tool approvals: normal work is yolo; dangerous calls are gated by the extension hook ---
tools.approvalMode yolo
tools.approval {}

# --- subagent isolation: enable auto backend selection when isolated tasks are requested ---
task.isolation.mode auto

# --- advisor: stronger model passively reviews each turn, with bounded catch-up ---
advisor.enabled true
advisor.syncBacklog 1
