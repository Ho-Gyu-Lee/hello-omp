# omp portable settings — applied via `omp config set <key> <value>`
# Format: <key><space><value>   (one per line)
#   - value is compact JSON (no spaces) for record/array keys, or a scalar
#   - lines starting with # and blank lines are ignored
# Add more `omp config set` keys below as needed (the "등" in the deploy order).

# --- model roles (quality-first; reachable omp ceiling = xhigh) ---
modelRoles {"default":"openai-codex/gpt-5.5:xhigh","smol":"openai-codex/gpt-5.5:medium","task":"openai-codex/gpt-5.5:xhigh","commit":"openai-codex/gpt-5.5:medium","slow":"anthropic/claude-opus-4-8:xhigh","plan":"anthropic/claude-opus-4-8:xhigh","designer":"anthropic/claude-opus-4-8:xhigh","vision":"anthropic/claude-opus-4-8:high","advisor":"anthropic/claude-opus-4-8:xhigh"}

# --- symmetric fallback chains (codex<->anthropic on quota/429) ---
retry.fallbackChains {"default":["anthropic/claude-opus-4-8:xhigh"],"smol":["anthropic/claude-opus-4-8:medium"],"task":["anthropic/claude-opus-4-8:xhigh"],"commit":["anthropic/claude-opus-4-8:medium"],"slow":["openai-codex/gpt-5.5:xhigh"],"plan":["openai-codex/gpt-5.5:xhigh"],"designer":["openai-codex/gpt-5.5:xhigh"],"vision":["openai-codex/gpt-5.5:high"],"advisor":["openai-codex/gpt-5.5:xhigh"]}

# --- advisor: stronger model passively reviews each turn ---
advisor.enabled true
